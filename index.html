<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF ALL TOOLS</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#e74c3c;
color:white;
text-align:center;
padding:25px;
font-size:28px;
font-weight:bold;
}

.container{
padding:20px;
}

h2{
color:#444;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.tool{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
font-weight:bold;
}

.tool:hover{
background:#f1f1f1;
}

.upload-box{
background:white;
padding:20px;
border-radius:10px;
margin-top:20px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
padding:12px 20px;
background:#e74c3c;
border:none;
color:white;
border-radius:6px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#c0392b;
}

footer{
margin-top:40px;
background:#222;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>


<body>

<header>

PDF ALL TOOLS

</header>


<div class="container">


<h2>Merge PDF Tool</h2>

<div class="upload-box">

<input type="file" id="pdfFiles" multiple>

<br>

<button onclick="mergePDF()">Merge PDF</button>

</div>



<h2>Organize PDF</h2>

<div class="grid">

<div class="tool">Merge PDF</div>
<div class="tool">Split PDF</div>
<div class="tool">Remove Pages</div>
<div class="tool">Extract Pages</div>
<div class="tool">Organize PDF</div>

</div>


<h2>Convert Tools</h2>

<div class="grid">

<div class="tool">JPG to PDF</div>
<div class="tool">PDF to JPG</div>
<div class="tool">Word to PDF</div>
<div class="tool">PDF to Word</div>

</div>


</div>


<footer>

© 2026 PDF Tools Website

</footer>


<script>

async function mergePDF(){

const { PDFDocument } = PDFLib;

const files = document.getElementById('pdfFiles').files;

if(files.length === 0){

alert("Please upload PDF files");

return;

}

const mergedPdf = await PDFDocument.create();

for(let file of files){

const arrayBuffer = await file.arrayBuffer();

const pdf = await PDFDocument.load(arrayBuffer);

const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());

pages.forEach(page => mergedPdf.addPage(page));

}

const mergedPdfFile = await mergedPdf.save();

const blob = new Blob([mergedPdfFile], {type:'application/pdf'});

const link = document.createElement('a');

link.href = URL.createObjectURL(blob);

link.download = "merged.pdf";

link.click();

}

</script>


</body>

</html>
